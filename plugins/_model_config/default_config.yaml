allow_chat_override: true

chat_model:
  provider: "openrouter"
  # Changed from anthropic/claude-sonnet-4.6 on 2026-07-22, Liam D's call.
  # Verified against the live OpenRouter model list rather than guessed:
  #   moonshotai/kimi-k3   ctx 1,048,576   $3.00/M in, $15.00/M out
  # For comparison, kimi-k2.6 is $0.68/M in and $3.42/M out at 262k context,
  # so this is roughly 5x the input cost for 4x the context. Fine for chat,
  # worth watching once he is waking on every webhook and running overnight.
  #
  # NOTE: this is a DEFAULT. If usr/settings.json holds a saved model choice it
  # wins over this file. That file now lives on the persistent disk, so a value
  # saved through the settings UI will survive restarts and silently override
  # this. If a model change appears not to take effect, look there first.
  name: "moonshotai/kimi-k3"
  api_base: ""
  ctx_length: 1048576
  ctx_history: 0.7
  vision: true
  max_embeds: 10
  rl_requests: 0
  rl_input: 0
  rl_output: 0
  kwargs: {}

utility_model:
  provider: "openrouter"
  name: "google/gemini-3.1-flash-lite-preview"
  api_base: ""
  ctx_length: 128000
  ctx_input: 0.7
  rl_requests: 0
  rl_input: 0
  rl_output: 0
  kwargs: {}

embedding_model:
  provider: "huggingface"
  name: "sentence-transformers/all-MiniLM-L6-v2"
  api_base: ""
  rl_requests: 0
  rl_input: 0
  kwargs: {}