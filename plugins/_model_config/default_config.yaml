allow_chat_override: true

chat_model:
  provider: "openrouter"
  # The EVERYDAY model. Deliberately the cheap tier. Liam D's call: k2.6 for
  # everyday, k3 for the hard ones.
  #
  # Verified against the live OpenRouter model list on 2026-07-22 rather than
  # guessed:
  #   moonshotai/kimi-k2.6   ctx 262,144     $0.68/M in, $3.42/M out
  #   moonshotai/kimi-k3     ctx 1,048,576   $3.00/M in, $15.00/M out
  # So everyday costs roughly a fifth of what stepping up does.
  #
  # Was k3 for everything until measuring real turns made that look wrong:
  # median 27.6s to Scoopy's first word, and almost all of what he is actually
  # asked is "what is on today" or "look up this customer". Paying top rates,
  # on a context window a conversation about dog waste will never fill, to
  # answer those is waste.
  #
  # Briefly k2.5 by mistake on 2026-07-22: that is what the bundled "Cost
  # Efficient" preset happened to contain, and taking a preset's value instead
  # of the one actually asked for is not a shortcut worth having.
  #
  # Hard problems are handled by stepping up rather than by paying for the big
  # model all the time: the think_harder tool switches this conversation to the
  # "Max Power" preset for one turn, and a person can pin it for a whole thread.
  # See plugins/scoopy/helpers/care_mode.py.
  #
  # ctx_history is 0.7 of the window, so a smaller window is also a cap on how
  # much history is fed back each turn. At 1M that allowed roughly 734k tokens of
  # history per call, which is both slow and, at $3/M in, expensive.
  #
  # NOTE: this is a DEFAULT. If usr/settings.json holds a saved model choice it
  # wins over this file. That file now lives on the persistent disk, so a value
  # saved through the settings UI will survive restarts and silently override
  # this. If a model change appears not to take effect, look there first.
  name: "moonshotai/kimi-k2.6"
  api_base: ""
  ctx_length: 262144
  ctx_history: 0.7
  vision: true
  max_embeds: 10
  rl_requests: 0
  rl_input: 0
  rl_output: 0
  kwargs: {}

utility_model:
  provider: "openrouter"
  name: "google/gemini-3.1-flash-lite-preview"
  api_base: ""
  ctx_length: 128000
  ctx_input: 0.7
  rl_requests: 0
  rl_input: 0
  rl_output: 0
  kwargs: {}

embedding_model:
  provider: "huggingface"
  name: "sentence-transformers/all-MiniLM-L6-v2"
  api_base: ""
  rl_requests: 0
  rl_input: 0
  kwargs: {}